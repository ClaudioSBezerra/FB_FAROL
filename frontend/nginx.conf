server {
    listen 80;
    client_max_body_size 2048M;
    root /usr/share/nginx/html;

    # Docker embedded DNS — re-resolve 'api' a cada 5s (evita cache de IP velho)
    resolver 127.0.0.11 valid=5s ipv6=off;

    location /api/ {
        # IMPORTANTE: com proxy_pass usando variável, nginx NÃO anexa o URI
        # automaticamente. Precisa concatenar $request_uri explicitamente.
        set $upstream http://api:8087;
        proxy_pass $upstream$request_uri;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 1200s;
        proxy_read_timeout 1200s;

        proxy_request_buffering off;
        proxy_http_version 1.1;
        client_body_timeout 1200s;
    }

    location ^~ /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location / {
        index index.html;
        try_files $uri /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
}
