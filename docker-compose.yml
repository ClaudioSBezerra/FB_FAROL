services:
  # Backend (Go) — Traefik roteia /api/* direto pra cá
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    expose:
      - "8087"
    ports:
      - "8087:8087"
    environment:
      - PORT=8087
      - DATABASE_URL=postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-fb_farol}?sslmode=disable
      - REDIS_ADDR=redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
      - APP_MODULE=${APP_MODULE:-farol}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - APP_URL=${APP_URL:-https://farol.fbtax.cloud}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://farol.fbtax.cloud}
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    volumes:
      - api_uploads:/root/uploads
    networks:
      - fb_net
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.farol-api.rule=Host(`farol.fbtax.cloud`) && PathPrefix(`/api/`)"
      - "traefik.http.routers.farol-api.entrypoints=https"
      - "traefik.http.routers.farol-api.tls=true"
      - "traefik.http.routers.farol-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.farol-api.priority=10"
      - "traefik.http.services.farol-api.loadbalancer.server.port=8087"

  # Frontend (React/Nginx) — Traefik roteia tudo que NÃO é /api/* pra cá
  web:
    build:
      context: ./frontend
      args:
        - VITE_APP_MODULE=${VITE_APP_MODULE:-farol}
    restart: always
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.farol.rule=Host(`farol.fbtax.cloud`)"
      - "traefik.http.routers.farol.entrypoints=https"
      - "traefik.http.routers.farol.tls=true"
      - "traefik.http.routers.farol.tls.certresolver=letsencrypt"
      - "traefik.http.routers.farol.priority=1"
      - "traefik.http.services.farol.loadbalancer.server.port=80"
    depends_on:
      - api
    networks:
      - fb_net
      - coolify

  # Banco de Dados
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-fb_farol}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fb_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cria a database se não existir (POSTGRES_DB só roda no init do volume vazio)
  db-init:
    image: postgres:15-alpine
    depends_on:
      db:
        condition: service_healthy
    environment:
      - PGPASSWORD=${DB_PASSWORD:-postgres}
      - DB_USER=${DB_USER:-postgres}
      - DB_NAME=${DB_NAME:-fb_farol}
    restart: "no"
    command: >
      sh -c "
        psql -h db -U $$DB_USER -tc \"SELECT 1 FROM pg_database WHERE datname = '$$DB_NAME'\" | grep -q 1 ||
        psql -h db -U $$DB_USER -c \"CREATE DATABASE \\\"$$DB_NAME\\\"\"
      "
    networks:
      - fb_net

  # Redis
  redis:
    image: redis:alpine
    restart: always
    sysctls:
      - net.core.somaxconn=1024
    networks:
      - fb_net

networks:
  fb_net:
    driver: bridge
  coolify:
    external: true

volumes:
  postgres_data:
  api_uploads:
